# cargo-deny — https://embarkstudios.github.io/cargo-deny/
# CI: .github/workflows/dependencies.yml (pins cargo-deny 0.19.4 for advisory DB compatibility)

[graph]
all-features = false

[advisories]
version = 2
# Transitive `number_prefix` via `indicatif` — remove when upstream drops or replaces it.
ignore = [{ id = "RUSTSEC-2025-0119", reason = "indicatif → number_prefix unmaintained; tracked for upgrade" }]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "0BSD",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]
exceptions = []

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
